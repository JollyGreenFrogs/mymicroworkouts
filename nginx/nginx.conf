server {
    listen 80;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://yuhonas.github.io; connect-src 'self' https://yuhonas.github.io" always;

    # Proxy /api/* to the FastAPI sidecar.
    # The trailing slash on proxy_pass strips the /api prefix before forwarding,
    # so /api/auth/login becomes /auth/login on the sidecar.
    location /api/ {
        proxy_pass http://auth-sidecar:8787/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Static frontend files
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
