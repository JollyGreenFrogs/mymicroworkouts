# docker-compose.uat.yml — UAT overlay for develop branch deployments on frost.
# Applied on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.uat.yml -p mymicroworkouts-uat up -d
#
# Differences from production:
#   - nginx exposed on port 8790 (prod is 8788)
#   - separate pgdata-uat volume so UAT and prod data never mix
#   - sidecar image tagged :uat so it stays independent from :prod
#   - ALLOWED_ORIGINS / FRONTEND_URL point to port 8790

services:
  postgres:
    volumes:
      - pgdata-uat:/var/lib/postgresql/data

  auth-sidecar:
    image: mymicroworkouts-auth-sidecar:uat
    environment:
      ALLOWED_ORIGINS: http://10.0.27.50:8790
      FRONTEND_URL: http://10.0.27.50:8790

  nginx:
    ports:
      - "8790:80"

volumes:
  pgdata-uat:
