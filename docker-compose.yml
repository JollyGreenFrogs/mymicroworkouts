# docker-compose.yml — MicroWorkouts development stack
# Runs postgres + jgf-auth sidecar + nginx frontend.
#
# Usage:
#   1. cp auth-sidecar/.env.example auth-sidecar/.env  (fill in DATA_ENCRYPTION_KEY + JWT_SECRET_KEY)
#   2. docker compose up --build
#   3. On first run, run migrations: docker compose exec auth-sidecar alembic upgrade head

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mwauth
      POSTGRES_PASSWORD: mwauth
      POSTGRES_DB: mwauth
    # No host port exposed — sidecar connects internally via Docker network
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mwauth"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-sidecar:
    build: ./auth-sidecar
    restart: unless-stopped
    # No external port — nginx proxies to this internally
    expose:
      - "8787"
    env_file:
      - ./auth-sidecar/.env
    environment:
      DATABASE_URL: postgresql://mwauth:mwauth@postgres:5432/mwauth
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8788:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-sidecar

volumes:
  pgdata:
