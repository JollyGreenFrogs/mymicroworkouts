# Woodpecker CI/CD pipeline for JollyGreenFrogs/mymicroworkouts
#
# Triggers:
#   develop → python-tests → e2e-tests → deploy-frost-uat  (port 8790)
#   main    → python-tests → e2e-tests → deploy-frost-prod (port 8788)
#
# Secrets required (set once in Woodpecker UI → Settings → Secrets):
#   MW_JWT_SECRET_KEY      — HS256 JWT secret for the sidecar
#   MW_DATA_ENCRYPTION_KEY — Fernet key used by the auth sidecar (DATA_ENCRYPTION_KEY)

when:
  event: push
  branch:
    - main
    - develop

steps:
  # ---------------------------------------------------------------------------
  # Step 1: Python tests for the auth sidecar (develop and main)
  # ---------------------------------------------------------------------------
  python-tests:
    image: python:3.12-slim
    commands:
      - cd auth-sidecar/jgf-auth
      - pip install --quiet -e ".[dev]"
      - pytest tests/ -q

  # ---------------------------------------------------------------------------
  # Step 2: E2E tests — headless Chromium via Playwright (develop and main)
  # Needs Docker so it can spin up docker-compose.e2e.yml
  # ---------------------------------------------------------------------------
  e2e-tests:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - apt-get update -qq && apt-get install -y --no-install-recommends docker-compose-plugin
      - npm ci --ignore-scripts
      - npx playwright install chromium
      - npm run test:e2e
      # Always tear down the e2e stack after tests
      - docker compose -f docker-compose.e2e.yml down -v || true

  # ---------------------------------------------------------------------------
  # Step 3: Deploy to frogjump UAT (develop only) — http://10.0.27.51:8790
  # CI runner is on frogjump — use the local Docker socket directly.
  # ---------------------------------------------------------------------------
  deploy-frost-uat:
    image: docker:27-cli
    environment:
      MW_JWT_SECRET_KEY:
        from_secret: mw_jwt_secret_key
      MW_DATA_ENCRYPTION_KEY:
        from_secret: mw_data_encryption_key
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      # Build both images locally (frogjump's Docker socket)
      - docker build -t mymicroworkouts-auth-sidecar:uat ./auth-sidecar
      - docker build -t mymicroworkouts-nginx:uat --file nginx/Dockerfile .

      # Bring up UAT stack — compose reads files from the CI workspace,
      # MW_JWT_SECRET_KEY / MW_DATA_ENCRYPTION_KEY come from the step environment above
      - docker compose -f docker-compose.yml -f docker-compose.uat.yml -p mymicroworkouts-uat up -d postgres auth-sidecar nginx

      # Run Alembic migrations
      - docker compose -p mymicroworkouts-uat exec -T auth-sidecar alembic upgrade head
      - echo "=== UAT deploy complete — http://10.0.27.51:8790 ==="
    when:
      event: push
      branch: develop

  # ---------------------------------------------------------------------------
  # Step 4: Deploy to frost production (main only) — http://10.0.27.50:8788
  # Uses Docker context 'frost' — no rsync, no SSH.
  # ---------------------------------------------------------------------------
  deploy-frost:
    image: docker:27-cli
    environment:
      MW_JWT_SECRET_KEY:
        from_secret: mw_jwt_secret_key
      MW_DATA_ENCRYPTION_KEY:
        from_secret: mw_data_encryption_key
    volumes:
      - /home/venura/.docker:/root/.docker
    commands:
      # Build both images on frost via Docker context (build context sent from CI)
      - docker --context frost build -t mymicroworkouts-auth-sidecar:prod ./auth-sidecar
      - docker --context frost build -t mymicroworkouts-nginx:prod --file nginx/Dockerfile .

      # Bring up prod stack on frost — compose runs locally, talks to frost's daemon,
      # MW_JWT_SECRET_KEY / MW_DATA_ENCRYPTION_KEY come from the step environment above
      - docker --context frost compose -f docker-compose.yml up -d postgres auth-sidecar nginx

      # Run Alembic migrations on frost
      - docker --context frost compose -f docker-compose.yml exec -T auth-sidecar alembic upgrade head
      - echo "=== Deploy complete — http://10.0.27.50:8788 ==="
    when:
      event: push
      branch: main

