# Woodpecker CI/CD pipeline for JollyGreenFrogs/mymicroworkouts
#
# Triggers:
#   develop → python-tests → e2e-tests
#   main    → python-tests → e2e-tests → deploy-frost
#
# Secrets required (set once in Woodpecker UI → Settings → Secrets):
#   MW_JWT_SECRET_KEY      — HS256 JWT secret for the sidecar
#   MW_DATA_ENCRYPTION_KEY — Fernet key used by the auth sidecar (DATA_ENCRYPTION_KEY)

when:
  event: push
  branch:
    - main
    - develop

steps:
  # ---------------------------------------------------------------------------
  # Step 1: Python tests for the auth sidecar (develop and main)
  # ---------------------------------------------------------------------------
  python-tests:
    image: python:3.12-slim
    commands:
      - cd auth-sidecar/jgf-auth
      - pip install --quiet -e ".[dev]"
      - pytest tests/ -q

  # ---------------------------------------------------------------------------
  # Step 2: E2E tests — headless Chromium via Playwright (develop and main)
  # Needs Docker so it can spin up docker-compose.e2e.yml
  # ---------------------------------------------------------------------------
  e2e-tests:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - apt-get update -qq && apt-get install -y --no-install-recommends docker-compose-plugin
      - npm ci --ignore-scripts
      - npx playwright install chromium
      - npm run test:e2e
      # Always tear down the e2e stack after tests
      - docker compose -f docker-compose.e2e.yml down -v || true

  # ---------------------------------------------------------------------------
  # Step 3: Deploy to frost (main only)
  # ---------------------------------------------------------------------------
  deploy-frost:
    image: docker:27-cli
    environment:
      MW_JWT_SECRET_KEY:
        from_secret: mw_jwt_secret_key
      MW_DATA_ENCRYPTION_KEY:
        from_secret: mw_data_encryption_key
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/venura/.ssh/id_ed25519:/root/.ssh/id_ed25519
      - /home/venura/.docker:/root/.docker
    commands:
      - chmod 600 /root/.ssh/id_ed25519
      - mkdir -p /root/.ssh && printf "Host frost\n  Hostname 10.0.27.50\n  User root\n  StrictHostKeyChecking no\nHost *\n  StrictHostKeyChecking no\n" > /root/.ssh/config
      - apk add --no-cache rsync openssh-client

      # Build the auth-sidecar image directly on frost
      - docker --context frost build -t mymicroworkouts-auth-sidecar:latest ./auth-sidecar

      # Write the sidecar .env for frost
      - printf "DATABASE_URL=postgresql://mwauth:mwauth@postgres:5432/mwauth\nDATA_ENCRYPTION_KEY=%s\nJWT_SECRET_KEY=%s\nALLOWED_ORIGINS=http://10.0.27.50:8788\nENVIRONMENT=production\nFRONTEND_URL=http://10.0.27.50:8788\n" "$MW_DATA_ENCRYPTION_KEY" "$MW_JWT_SECRET_KEY" > /tmp/frost.sidecar.env

      # Sync source to frost (exclude secrets and large generated dirs)
      - rsync -az --delete
          --exclude='.git'
          --exclude='node_modules'
          --exclude='auth-sidecar/jgf-auth'
          --exclude='auth-sidecar/.env'
          ./ frost:/home/venura/mymicroworkouts/
      - rsync -az /tmp/frost.sidecar.env frost:/home/venura/mymicroworkouts/auth-sidecar/.env

      # On frost: bring up postgres + sidecar + nginx via docker compose
      - |
        ssh frost bash -s << 'ENDSSH'
        set -e
        cd /home/venura/mymicroworkouts
        docker compose up -d postgres auth-sidecar nginx
        # Wait for sidecar to be healthy
        i=0; while [ $i -lt 30 ]; do
          docker compose exec -T auth-sidecar python -c \
            "import urllib.request; urllib.request.urlopen('http://localhost:8787/health')" \
            2>/dev/null && break
          i=$((i+1)); sleep 2
        done
        # Run Alembic migrations
        docker compose exec -T auth-sidecar alembic upgrade head
        echo "=== Deploy complete — http://10.0.27.50:8788 ==="
        ENDSSH
    when:
      event: push
      branch: main

